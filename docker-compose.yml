services:
  traefik:
    image: traefik:v3.3
    container_name: shared-local-proxy
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.proxy-dashboard.rule=Host(`proxy.localhost.test`)
      - traefik.http.routers.proxy-dashboard.entrypoints=web
      - traefik.http.routers.proxy-dashboard.service=api@internal
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    name: traefik-proxy
    external: true
